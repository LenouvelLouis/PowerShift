name: Frontend CI

on:
  push:
    branches: ["*"]
    paths:
      - "energy-dashboard/**"
  pull_request:
    branches: ["*"]
    paths:
      - "energy-dashboard/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: energy-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: energy-dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (auto-fix stylistic issues)
        run: pnpm lint --fix

      - name: Lint (verify clean)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
