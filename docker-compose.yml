services:

  # --- PostgreSQL database ------------------------------------------------
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: powershift
      POSTGRES_PASSWORD: powershift
      POSTGRES_DB: powershift
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/seed_data.sql:/docker-entrypoint-initdb.d/seed_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powershift"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- FastAPI backend ----------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://powershift:powershift@db:5432/powershift
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./app
          target: /workspace/app

  # --- Nuxt frontend ------------------------------------------------------
  frontend:
    build:
      context: ./energy-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NUXT_API_BASE_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
