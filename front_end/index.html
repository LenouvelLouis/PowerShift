<!DOCTYPE html>
<html>
<link rel="stylesheet" href="index.css">
<body>
    <div class="Top">
        <img class="logo" src="img/logo.png" alt="Logo">
        <div class="Title">ENERGY NETWORK SIMULATOR</div>
        <div class="Title_y">2026</div>
        <select name="" id="" class="Select">
            <option>Scénario 1</option>
            <option>Scénario 2</option>
            <option>Scénario 3</option>
            <option>Scénario 4</option>
        </select>
        <div class="Button_div">
            <button class="Button_play_stop" onclick="startSimulation()">
                <svg viewBox="0 0 24 24" fill="white" width="15" height="15">
                    <polygon points="5,3 19,12 5,21 5,3"/>
                </svg>
            </button>
            <button class="Button_play_stop" onclick="stopSimulation()">
                <svg viewBox="0 0 24 24" fill="Red" width="20" height="20">
                    <rect x="8" y="8" width="9" height="9" rx="1"/>
                </svg>
            </button>
        </div>
            <div class="Loader" id="Loader"></div>





            <button class="Export">Export</button>
    </div>
    


    <div class="Mid">
        <div class="Main_content"> 
            <div class="Schemas">
            </div>
            <div class="Kpi-list">
                <div class="Kpi"></div>
                <div class="Kpi"></div>
                <div class="Kpi"></div>
                <div class="Kpi"></div>
            </div>
        </div>
        <div class="Right_panel">
        </div>
    </div>


    <div class="Bottom">
    </div>



<script>
    function startSimulation() {
    document.getElementById('Loader').style.display = 'block';
}

function stopSimulation() {
    document.getElementById('Loader').style.display = 'none';
}
</script>











</body>
</html>
