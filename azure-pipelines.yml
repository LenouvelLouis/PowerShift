trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

variables:
  - group: energy-grid-prod

jobs:
  # ─── Tests ────────────────────────────────────────────────────────────────────
  - job: test
    displayName: 'Test'
    pool:
      vmImage: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.11'
        displayName: 'Setup Python 3.11'

      - script: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        displayName: 'Install dependencies'

      - script: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --junitxml=test-results.xml \
            -v
        displayName: 'Run tests'
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpassword@localhost:5432/testdb
          APP_NAME: 'Energy Grid API'
          APP_VERSION: '0.1.0'
          ENVIRONMENT: testing
          DEBUG: 'false'

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: test-results.xml
        condition: always()
        displayName: 'Publish test results'

      - task: PublishCodeCoverageResults@2
        inputs:
          summaryFileLocation: coverage.xml
        condition: always()
        displayName: 'Publish coverage'

  # ─── Deploy ───────────────────────────────────────────────────────────────────
  - job: deploy
    displayName: 'Deploy to Azure VM'
    dependsOn: test
    condition: and(succeeded('test'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    pool:
      vmImage: ubuntu-latest

    steps:
      - task: DownloadSecureFile@1
        name: sshKey
        inputs:
          secureFile: 'azure.key'
        displayName: 'Download SSH key'

      - script: |
          mkdir -p ~/.ssh
          cp $(sshKey.secureFilePath) ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H $(VM_HOST) >> ~/.ssh/known_hosts 2>/dev/null
        displayName: 'Configure SSH key'

      - script: |
          printf "APP_NAME=%s\nAPP_VERSION=%s\nENVIRONMENT=%s\nDEBUG=false\nHOST=0.0.0.0\nPORT=8000\nDATABASE_URL=%s\nKNMI_API_KEY=%s\nNUXT_API_BASE_URL=http://backend:8000\n" \
            "$APP_NAME" "$APP_VERSION" "$ENVIRONMENT" "$DATABASE_URL" "$KNMI_API_KEY" > /tmp/.env
          scp -i ~/.ssh/vm_key -o StrictHostKeyChecking=no /tmp/.env $(VM_USER)@$(VM_HOST):/home/$(VM_USER)/isep-app/.env
        displayName: 'Push .env to VM'
        env:
          APP_NAME: $(APP_NAME)
          APP_VERSION: $(APP_VERSION)
          ENVIRONMENT: $(ENVIRONMENT)
          DATABASE_URL: $(DATABASE_URL)
          KNMI_API_KEY: $(KNMI_API_KEY)

      - script: |
          set -euo pipefail
          CLEAN_URI=$(echo "$REPO_URI" | sed 's|https://[^@]*@|https://|')
          AUTH_URL=$(echo "$CLEAN_URI" | sed "s|https://|https://pat:${SYSTEM_ACCESSTOKEN}@|")

          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=no $(VM_USER)@$(VM_HOST) "
            set -euo pipefail
            REPO_DIR=/home/azureuser/isep-app
            if [ -d \"\$REPO_DIR/.git\" ]; then
              git -C \"\$REPO_DIR\" fetch --all
              git -C \"\$REPO_DIR\" reset --hard origin/main
            else
              git clone '$AUTH_URL' \"\$REPO_DIR\"
            fi
            cd \"\$REPO_DIR\"
            DOCKER_BUILDKIT=1 sudo -E docker compose up --build -d
          "
        displayName: 'Deploy via Docker Compose'
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)
          REPO_URI: $(Build.Repository.Uri)

      - script: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=no $(VM_USER)@$(VM_HOST) bash << 'ENDSSH'
          set -euo pipefail

          echo "==> Health check backend (port 8000)"
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Backend OK"
              break
            fi
            echo "Attempt $i/10 failed, retrying in 5s..."
            sleep 5
            if [ "$i" -eq 10 ]; then
              echo "Backend health check failed"
              exit 1
            fi
          done

          echo "==> Health check frontend (port 80)"
          for i in $(seq 1 10); do
            if curl -sf http://localhost:80 > /dev/null; then
              echo "Frontend OK"
              break
            fi
            echo "Attempt $i/10 failed, retrying in 5s..."
            sleep 5
            if [ "$i" -eq 10 ]; then
              echo "Frontend health check failed"
              exit 1
            fi
          done
          ENDSSH
        displayName: 'Health checks'
