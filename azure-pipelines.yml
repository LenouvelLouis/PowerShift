trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

schedules:
  - cron: "0 7 * * *"
    displayName: "Daily CI at 7:00 AM UTC"
    branches:
      include:
        - test/bdd-automation
        - main
        - develop
    always: true

variables:
  - group: energy-grid-prod
  - name: DATABASE_URL
    value: postgresql+asyncpg://testuser:testpassword@localhost:5432/testdb
  - name: APP_NAME
    value: 'Energy Grid API'
  - name: APP_VERSION
    value: '0.1.0'
  - name: ENVIRONMENT
    value: testing
  - name: DEBUG
    value: 'false'

jobs:
  # ── Stage 1: Unit + API + BDD tests ────────────────────────────────────────
  - job: unit_api_bdd
    displayName: 'Unit / API / BDD Tests'
    pool:
      vmImage: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.11'
        displayName: 'Setup Python 3.11'

      - script: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        displayName: 'Install dependencies'

      - script: |
          ruff check app
        displayName: 'Ruff lint (app)'

      - script: |
          pytest tests/unit/ tests/api/ tests/bdd/ tests/simulation/ tests/integration/ \
            --ignore=tests/ui \
            --cov=app \
            --cov-report=xml \
            --junitxml=test-results.xml \
            -v
        displayName: 'Run Unit + API + BDD tests'
        env:
          DATABASE_URL: $(DATABASE_URL)
          APP_NAME: $(APP_NAME)
          APP_VERSION: $(APP_VERSION)
          ENVIRONMENT: $(ENVIRONMENT)
          DEBUG: $(DEBUG)

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: test-results.xml
        condition: always()
        displayName: 'Publish test results'

      - task: PublishCodeCoverageResults@2
        inputs:
          summaryFileLocation: coverage.xml
        condition: always()
        displayName: 'Publish coverage'

  # ── Stage 2: UI tests (Selenium) ───────────────────────────────────────────
  - job: ui_tests
    displayName: 'UI Tests (Selenium)'
    dependsOn: unit_api_bdd
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '$(PYTHON_VERSION)'
        displayName: 'Setup Python $(PYTHON_VERSION)'

      - script: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        displayName: 'Install dependencies'

      - script: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser chromium-chromedriver
        displayName: 'Install Chrome + Chromedriver'

      - script: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          pytest tests/ui/ \
            --junitxml=ui-test-results.xml \
            -v
        displayName: 'Start server and run Selenium tests'
        env:
          DATABASE_URL: $(DATABASE_URL)
          APP_NAME: $(APP_NAME)
          APP_VERSION: $(APP_VERSION)
          ENVIRONMENT: $(ENVIRONMENT)
          DEBUG: $(DEBUG)
          TEST_BASE_URL: 'http://localhost:8000'

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: ui-test-results.xml
        condition: always()
        displayName: 'Publish UI test results'

  # ─── Deploy ───────────────────────────────────────────────────────────────────
  - job: deploy
    displayName: 'Deploy to Azure VM'
    dependsOn:
      - unit_api_bdd
      - ui_tests
    condition: and(succeeded('unit_api_bdd'), succeeded('ui_tests'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    pool:
      vmImage: ubuntu-latest

    steps:
      - task: DownloadSecureFile@1
        name: sshKey
        inputs:
          secureFile: 'azure.key'
        displayName: 'Download SSH key'

      - script: |
          mkdir -p ~/.ssh
          cp $(sshKey.secureFilePath) ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          ssh-keyscan -H $(VM_HOST) >> ~/.ssh/known_hosts 2>/dev/null
        displayName: 'Configure SSH key'

      - script: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=no $(VM_USER)@$(VM_HOST) "mkdir -p /home/$(VM_USER)/isep-app"
          printf "APP_NAME=%s\nAPP_VERSION=%s\nENVIRONMENT=%s\nDEBUG=false\nHOST=0.0.0.0\nPORT=8000\nDATABASE_URL=%s\nKNMI_API_KEY=%s\nNUXT_API_BASE_URL=http://backend:8000\n" \
            "$APP_NAME" "$APP_VERSION" "$ENVIRONMENT" "$DATABASE_URL" "$KNMI_API_KEY" > /tmp/.env
          scp -i ~/.ssh/vm_key -o StrictHostKeyChecking=no /tmp/.env $(VM_USER)@$(VM_HOST):/home/$(VM_USER)/isep-app/.env
        displayName: 'Push .env to VM'
        env:
          APP_NAME: $(APP_NAME)
          APP_VERSION: $(APP_VERSION)
          ENVIRONMENT: $(ENVIRONMENT)
          DATABASE_URL: $(DATABASE_URL)
          KNMI_API_KEY: $(KNMI_API_KEY)

      - script: |
          set -euo pipefail
          DEST=$(VM_USER)@$(VM_HOST):/home/$(VM_USER)/isep-app/
          # Sync repo from agent to VM (agent already has the checkout)
          rsync -az --delete \
            -e "ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.docker_data' \
            --exclude '__pycache__' \
            --exclude '.env' \
            "$(Build.SourcesDirectory)/" "$DEST"
          # Build and deploy
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=no $(VM_USER)@$(VM_HOST) \
            "cd /home/$(VM_USER)/isep-app && DOCKER_BUILDKIT=1 sudo -E docker compose up --build -d"
        displayName: 'Deploy via Docker Compose'

      - script: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=no $(VM_USER)@$(VM_HOST) bash << 'ENDSSH'
          set -euo pipefail

          echo "==> Health check backend (port 8000)"
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Backend OK"
              break
            fi
            echo "Attempt $i/10 failed, retrying in 5s..."
            sleep 5
            if [ "$i" -eq 10 ]; then
              echo "Backend health check failed"
              exit 1
            fi
          done

          echo "==> Health check frontend (port 80)"
          for i in $(seq 1 10); do
            if curl -sf http://localhost:80 > /dev/null; then
              echo "Frontend OK"
              break
            fi
            echo "Attempt $i/10 failed, retrying in 5s..."
            sleep 5
            if [ "$i" -eq 10 ]; then
              echo "Frontend health check failed"
              exit 1
            fi
          done
          ENDSSH
        displayName: 'Health checks'
